<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-Commerce Boilerplate</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Shop<span>Go</span></a>

            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="products.html"><i class="fa-solid fa-bag-shopping"></i> Products</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
                <li><a href="wishlist.html"><i class="fa-solid fa-star"></i> Wishlist</a></li>
                <li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>
                <li id="admin-nav-item" style="display: none;">
                    <a href="admin.html" class="nav-item admin-link"><i class="fa-solid fa-gauge"></i> Admin</a>
                </li>
            </ul>
        </div>
    </nav>
    <main class="container" style="min-height: 70vh; padding: 40px 0;">
        <div style="text-align: center; margin-top: 80px;">
            <h1 style="font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 2.5rem; margin-bottom: 20px;">
                Welcome to ShopGo
            </h1>
            <h1>Register now!</h1>

            <div id="registerForm">

                <div class="input-control">
                    <label>Name</label>
                    <input id="registerName" type="text">
                </div>

                <div class="input-control">
                    <label>Email</label>
                    <input id="registerEmail" type="email">
                </div>

                <div class="input-control">
                    <label>Password</label>
                    <input id="registerPassword" type="password">
                </div>

                <button class="btn-gold" onclick="register()">Register</button>

                <p>
                    Already have an account?
                    <button type="button" class="btn-gold" onclick="showLogin()">Login Instead</button>
                </p>

            </div>

            <div id="loginForm" style="display: none;">

                <div class="input-control">
                    <label>Email</label>
                    <input id="loginEmail" type="email">
                </div>

                <div class="input-control">
                    <label>Password</label>
                    <input id="loginPassword" type="password">
                </div>

                <button class="btn-gold" onclick="login()">Login</button>

                <p>
                    Don't have an account yet?
                    <button type="button" class="btn-gold" onclick="showRegister()">Register Now</button>
                </p>

            </div>

            <div id="profileSection" style="display: none;">

                <div class="profile-card">

                    <div class="profile-icon">
                        <i class="fa-solid fa-user"></i>
                    </div>

                    <h2 id="welcomeText"></h2>

                    <div class="profile-info">

                        <div class="info-row">
                            <label>Name</label>
                            <div class="info-box">
                                <span id="profileName"></span>
                                <i class="fa-solid fa-pen edit-icon" onclick="enableEdit('name')"></i>
                            </div>
                        </div>

                        <div class="info-row">
                            <label>Email</label>
                            <div class="info-box">
                                <span id="profileEmail"></span>
                                <i class="fa-solid fa-pen edit-icon" onclick="enableEdit('email')"></i>
                            </div>
                        </div>

                        <div class="info-row">
                            <label>Password</label>
                            <div class="info-box">
                                <span id="profilePassword"></span>
                                <i class="fa-solid fa-pen edit-icon" onclick="enableEdit('password')"></i>
                            </div>
                        </div>

                        <div id="editBox" style="display: none;">
                            <input id="editInput" type="text">
                            <button class="btn-gold" onclick="saveEdit()">Save</button>
                        </div>

                        <div class="profile-actions">
                            <button class="btn-gold" onclick="logout()">Logout</button>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 E-Commerce Team Project.</p>
        </div>
    </footer>

    <script src="js/global.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>

</body>
</html>
