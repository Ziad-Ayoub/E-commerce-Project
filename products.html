<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-Commerce Boilerplate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/products.css">
    <link rel="stylesheet" href="JS/products.js">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">My<span>Store</span></a>

            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="products.html"><i class="fa-solid fa-bag-shopping"></i> Products</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
                <li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>
            </ul>
        </div>
    </nav>

    <div class="category-container" tyle="text-align: left; margin-top: 300px; margin-left: px;">
        <!--category side filter-->
            <aside class="filters">
                <div class="filter-group">
                    <h3 class="filter-title">
                        <span>Category</span>
                    </h3>
                    <ul class="filter-options">
                        <li>
                            <input type="checkbox" id="accessories" data-filter="Category" data-value="Accessories">
                            <label for="accessories">Accessories</label>
                        </li>
                        <li>
                            <input type="checkbox" id="clothing" data-filter="Category" data-value="Clothing">
                            <label for="clothing">Clothing</label>
                        </li>
                        <li>
                            <input type="checkbox" id="shoes" data-filter="Category" data-value="Shoes">
                            <label for="shoes">Shoes</label>
                        </li>
                        <li>
                            <input type="checkbox" id="electronics" data-filter="Category" data-value="Electronics">
                            <label for="electronics">Electronics</label>
                        </li>
                    </ul>
                </div>
                <div class="filter-group">
                    <h3 class="filter-title">Pricing</h3>
                    <div class="price-range">
                        <div class="price-inputs">
                            <div class="price-input">
                                <label>Min</label>
                                <input type="number" id="minprice" placeholder="0$" min="0">
                            </div>
                            <div class="price-input">
                                <label>Max</label>
                                <input type="number" id="maxprice" placeholder="1000$" max="1000000">
                            </div>
                        </div>
                    </div>
                </div>
                <button class="clear-filters" id="clearFilters">Clear All Filters</button>
            </aside>
        </div>

    </div>
    <main class="main-content" style="min-height: 70vh; padding: 40px 0;">
        <!--Search Bar-->
        <section class="search-section">
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Search products..." id="searchInput">
            </div>
        </section>
        <!--Products-->
        <div class="results-info">
            showing <span id="resultCount"> 12 </span> of <span id="totalProducts">156</span> products
        </div>
        <div class="products-grid" id="productsGrid">

        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 E-Commerce Team Project. </p>
        </div>
    </footer>
    <script src="JS/products.js"></script>
</body>

</html>
